<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공공데이터 놀이터 - 책 찾기 & 급식 보기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F4F7F3;
    --paper: #FFFFFF;
    --ink: #2C3B36;
    --muted: #6E8079;
    --coral: #C97B5C;
    --yellow: #B98D5B;
    --sky: #7FB3A0;
    --green: #5E9B82;
    --purple: #4A6572;
    --line: #DCE6DE;
    --shadow: 0 2px 10px rgba(44,59,54,0.08);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    background-image:
      repeating-linear-gradient(to bottom, transparent, transparent 27px, rgba(44,59,54,0.035) 28px),
      radial-gradient(circle at 6% 10%, rgba(95,155,130,0.08) 0, transparent 42%),
      radial-gradient(circle at 94% 88%, rgba(74,101,114,0.07) 0, transparent 42%);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }
  .app{
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
  header{
    text-align: center;
    padding: 10px 10px 24px;
  }
  header h1{
    font-family: 'Jua', sans-serif;
    font-weight:400;
    font-size: 23px;
    margin: 0 0 6px;
    color: var(--ink);
    letter-spacing: -0.3px;
  }
  header p{
    margin:0;
    font-size: 13.5px;
    color: var(--muted);
  }

  /* 탭 */
  .tabs{
    display:flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab-btn{
    flex:1;
    font-family: 'Jua', sans-serif;
    font-weight:400;
    font-size: 14.5px;
    padding: 12px 8px;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    background: var(--paper);
    color: var(--muted);
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, color .15s ease, transform .1s ease;
  }
  .tab-btn:active{ transform: scale(.98); }
  .tab-btn[data-tab="meal"].active{
    background: rgba(94,155,130,0.12);
    border-color: var(--green);
    color: var(--ink);
    font-weight: 700;
  }
  .tab-btn[data-tab="library"].active{
    background: rgba(185,141,91,0.14);
    border-color: var(--yellow);
    color: var(--ink);
    font-weight: 700;
  }

  .tab-panel{ display:none; animation: pop .2s ease; }
  .tab-panel.active{ display:block; }
  @keyframes pop{ from{ opacity:0; transform: translateY(3px); } to{ opacity:1; transform: translateY(0); } }

  .card{
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    padding: 18px;
    box-shadow: var(--shadow);
  }

  .field-row{ display:flex; gap:8px; margin-bottom: 12px; flex-wrap: wrap; }
  .field-row > *{ flex:1; min-width: 120px; }

  input[type="text"], input[type="date"], select{
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14.5px;
    padding: 11px 12px;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    background: #FBFCFA;
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease;
  }
  input:focus, select:focus{ border-color: var(--sky); }

  .btn{
    font-family: 'Jua', sans-serif;
    font-weight:400;
    font-size: 14.5px;
    padding: 11px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(44,59,54,0.12);
    transition: transform .1s ease, opacity .1s ease;
    white-space: nowrap;
  }
  .btn:active{ transform: scale(.98); opacity:.92; }
  .btn-coral{ background: var(--coral); color: white; }
  .btn-green{ background: var(--green); color: white; }

  .hint{ font-size: 12px; color: var(--muted); margin: 6px 2px 0; line-height:1.5; }

  .autocomplete-wrap{ position: relative; }
  .suggest-list{
    list-style:none;
    margin:0; padding:0;
    position:absolute;
    top: calc(100% + 4px);
    left:0; right:0;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow);
    max-height: 220px;
    overflow-y:auto;
    z-index: 20;
    display:none;
  }
  .suggest-list.show{ display:block; }
  .suggest-list li{
    padding: 10px 14px;
    font-size: 13.5px;
    cursor:pointer;
    border-bottom: 1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
  }
  .suggest-list li:last-child{ border-bottom:none; }
  .suggest-list li:hover, .suggest-list li.active{ background: #EEF4F0; }
  .suggest-list li .s-name{ font-weight:700; }
  .suggest-list li .s-kind{ font-size:11px; color: var(--muted); flex-shrink:0; }
  .suggest-list li.suggest-empty{ color: var(--muted); cursor:default; }
  .suggest-list li.suggest-empty:hover{ background:none; }

  .status{
    text-align:center;
    padding: 22px 10px;
    font-size: 13.5px;
    color: var(--muted);
    line-height:1.6;
  }
  .status .status-icon{ font-size: 18px; display:block; margin-bottom:6px; opacity:.8; }

  /* 책 결과: 책장/책등 느낌 */
  .book-list{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .book-card{
    display:flex;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    overflow:hidden;
    background: #FBFCFA;
    animation: slideIn .25s ease both;
  }
  .book-spine{
    width: 8px;
    flex-shrink:0;
  }
  .book-info{ padding: 10px 14px; }
  .book-info .title{ font-weight:700; font-size:14.5px; margin-bottom:3px; }
  .book-info .meta{ font-size:12px; color: var(--muted); }
  .book-info .badge{
    display:inline-block; margin-top:6px; font-size:11px;
    background: #EEF2F6; color: var(--purple); padding:3px 8px; border-radius:6px; font-weight:700;
  }

  @keyframes slideIn{ from{ opacity:0; transform: translateX(-6px);} to{ opacity:1; transform: translateX(0);} }

  .meal-date-label{
    font-family:'Jua', sans-serif;
    font-weight:400;
    text-align:center;
    font-size:15px;
    margin: 2px 0 4px;
  }

  /* 주간(월~금) 급식 카드 */
  .week-wrap{
    margin-top: 12px;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .day-card{
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    background: #FBFCFA;
    animation: pop .2s ease;
  }
  .day-card.today{
    border-color: var(--coral);
    box-shadow: 0 0 0 2px rgba(201,123,92,0.14);
  }
  .day-header{
    display:flex;
    align-items:baseline;
    gap: 8px;
    margin-bottom: 10px;
  }
  .day-header .day-name{ font-family:'Jua', sans-serif; font-weight:400; font-size:14.5px; }
  .day-header .day-date{ font-size:12px; color: var(--muted); }
  .today-badge{
    margin-left:auto;
    font-size:10.5px;
    font-weight:700;
    color: white;
    background: var(--coral);
    padding: 2px 8px;
    border-radius: 7px;
  }
  .day-tray{
    background: #EEF3EF;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 10px;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .day-slot{
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 9px;
    min-height: 46px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 4px 3px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--ink);
  }
  .day-empty{
    text-align:center;
    font-size: 12.5px;
    color: var(--muted);
    padding: 12px 0;
  }

  footer{
    text-align:center;
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
  }
  .mock-flag{
    display:inline-block;
    margin-top:10px;
    font-size:10.5px;
    background: rgba(94,155,130,0.1);
    border:1px solid var(--line);
    color: var(--green);
    padding:4px 10px;
    border-radius:7px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>공공데이터 놀이터</h1>
    <p>도서관 책도 찾아보고, 오늘 급식도 확인해요!</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="meal" onclick="switchTab('meal')">급식 보기</button>
    <button class="tab-btn" data-tab="library" onclick="switchTab('library')">책 찾기</button>
  </nav>

  <main>
    <!-- 급식 검색 -->
    <section id="panel-meal" class="tab-panel active">
      <div class="card">
        <div class="field-row">
          <select id="officeSelect" onchange="onOfficeChange()"></select>
        </div>
        <div class="field-row autocomplete-wrap">
          <input type="text" id="schoolNameInput" placeholder="학교 이름을 입력하세요 (예: 늘봄초등학교)" autocomplete="off" />
          <input type="hidden" id="selectedSchulCode" value="" />
          <ul id="schoolSuggestions" class="suggest-list"></ul>
        </div>
        <input type="date" id="mealDate" style="display:none" />
        <div class="field-row">
          <button class="btn btn-green" onclick="searchMeal()">이번주 급식 보기</button>
        </div>
        <div class="hint">NEIS 급식식단정보 API 연동 (자체 서버 프록시 경유) · 정확한 학교 전체 이름을 입력해 주세요 · 오늘이 속한 주(월~금)를 한번에 보여줘요</div>
        <div id="mealResult"></div>
      </div>
    </section>

    <!-- 도서관 도서 검색 -->
    <section id="panel-library" class="tab-panel">
      <div class="card">
        <div class="field-row">
          <input type="text" id="bookKeyword" placeholder="예: 마법천자문, 공룡, 위인전" />
          <button class="btn btn-coral" onclick="searchBooks()">찾기</button>
        </div>
        <div class="hint">도서관정보나루 API 연동 예정 · 지금은 샘플 데이터로 보여줘요</div>
        <div id="bookResult"></div>
      </div>
    </section>
  </main>

  <footer>
    만든이: 대디랩스 · 공공데이터포털 Open API 활용
    <br><span class="mock-flag">급식: 실제 API 연동 · 도서: 샘플(목업) 데이터</span>
  </footer>
</div>

<script>
/* ============================================================
   CONFIG - API 키가 발급되면 아래에 입력하고 USE_MOCK 을 false 로 바꾸세요.
   ============================================================ */
const CONFIG = {
  LIBRARY_API_KEY: '',   // 도서관정보나루(data4library.kr) 인증키 - 아직 미발급
  USE_MOCK_LIBRARY: true,   // 도서관 키 발급되면 false 로 변경
  LIBRARY_BASE_URL: 'https://data4library.kr/api/srchBooks',

  // 급식/학교 조회는 이제 우리 Vercel 프로젝트의 /api/neis 를 통해서만 호출합니다.
  // - CORS 문제 없음 (같은 도메인)
  // - API 키는 서버(Vercel 환경변수)에만 있고 브라우저에는 절대 노출되지 않음
  USE_MOCK_MEAL: false,
  NEIS_SCHOOL_URL: '/api/neis?path=schoolInfo',
  NEIS_MEAL_URL: '/api/neis?path=mealServiceDietInfo'
};

// 오늘 날짜 기본값 세팅
document.getElementById('mealDate').value = new Date().toISOString().slice(0,10);

/* ---------------- 시도교육청 코드 (NEIS ATPT_OFCDC_SC_CODE) ---------------- */
const OFFICE_CODES = [
  { code:'B10', name:'서울특별시교육청' },
  { code:'C10', name:'부산광역시교육청' },
  { code:'D10', name:'대구광역시교육청' },
  { code:'E10', name:'인천광역시교육청' },
  { code:'F10', name:'광주광역시교육청' },
  { code:'G10', name:'대전광역시교육청' },
  { code:'H10', name:'울산광역시교육청' },
  { code:'I10', name:'세종특별자치시교육청' },
  { code:'J10', name:'경기도교육청' },
  { code:'K10', name:'강원특별자치도교육청' },
  { code:'M10', name:'충청북도교육청' },
  { code:'N10', name:'충청남도교육청' },
  { code:'P10', name:'전북특별자치도교육청' },
  { code:'Q10', name:'전라남도교육청' },
  { code:'R10', name:'경상북도교육청' },
  { code:'S10', name:'경상남도교육청' },
  { code:'T10', name:'제주특별자치도교육청' },
];
const DEFAULT_OFFICE_CODE = 'J10'; // 경기도교육청

(function initOfficeSelect(){
  const sel = document.getElementById('officeSelect');
  sel.innerHTML = OFFICE_CODES.map(o =>
    `<option value="${o.code}" ${o.code === DEFAULT_OFFICE_CODE ? 'selected' : ''}>${o.name}</option>`
  ).join('');
})();

/* ---------------- 학교명 자동완성 ---------------- */
let suggestDebounce = null;
let suggestAbortSeq = 0;

function onOfficeChange(){
  // 교육청이 바뀌면 이전 선택/제안 초기화
  document.getElementById('selectedSchulCode').value = '';
  hideSuggestions();
}

document.getElementById('schoolNameInput').addEventListener('input', () => {
  document.getElementById('selectedSchulCode').value = ''; // 직접 타이핑 중이면 캐시된 코드 무효화
  clearTimeout(suggestDebounce);
  const q = document.getElementById('schoolNameInput').value.trim();
  if(q.length < 2){ hideSuggestions(); return; }
  suggestDebounce = setTimeout(() => fetchSchoolSuggestions(q), 300);
});

document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.autocomplete-wrap');
  if(wrap && !wrap.contains(e.target)) hideSuggestions();
});

function hideSuggestions(){
  const list = document.getElementById('schoolSuggestions');
  list.classList.remove('show');
  list.innerHTML = '';
}

async function fetchSchoolSuggestions(q){
  const officeCode = document.getElementById('officeSelect').value;
  const list = document.getElementById('schoolSuggestions');
  const mySeq = ++suggestAbortSeq;

  try{
    const url = `${CONFIG.NEIS_SCHOOL_URL}&ATPT_OFCDC_SC_CODE=${officeCode}&SCHUL_NM=${encodeURIComponent(q)}&pSize=8`;
    const res = await fetch(url);
    if(mySeq !== suggestAbortSeq) return; // 더 최신 입력이 있으면 이 응답은 버림
    if(!res.ok) throw new Error('http-' + res.status);
    const data = await res.json();
    const rows = data.schoolInfo?.[1]?.row || [];

    if(!rows.length){
      list.innerHTML = `<li class="suggest-empty">'${q}' 학교를 찾지 못했어요</li>`;
      list.classList.add('show');
      return;
    }

    list.innerHTML = rows.map(r => `
      <li onclick="pickSchool('${r.SD_SCHUL_CODE}', '${r.SCHUL_NM.replace(/'/g, "\\'")}')">
        <span class="s-name">${r.SCHUL_NM}</span>
        <span class="s-kind">${r.SCHUL_KND_SC_NM || ''}</span>
      </li>
    `).join('');
    list.classList.add('show');
  } catch(err){
    console.error(err);
    list.innerHTML = `<li class="suggest-empty">😥 검색 중 오류가 발생했어요. 다시 시도해 주세요.</li>`;
    list.classList.add('show');
  }
}

function pickSchool(schulCode, schoolName){
  document.getElementById('schoolNameInput').value = schoolName;
  document.getElementById('selectedSchulCode').value = schulCode;
  hideSuggestions();
}

/* ---------------- 탭 전환 ---------------- */
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

/* ---------------- 샘플(목업) 데이터 ---------------- */
const MOCK_BOOKS = [
  { title:'마법천자문 1권 - 불꽃 서유기', author:'김미영 글 / 홍거북 그림', publisher:'아울북', color:'coral' },
  { title:'흔한남매 학습만화 - 지구과학', author:'흔한남매 원작', publisher:'아이세움', color:'sky' },
  { title:'그리스 로마 신화 1', author:'토마스 불핀치 글', publisher:'삼성출판사', color:'purple' },
  { title:'who? 세종대왕', author:'이문영 글', publisher:'다산어린이', color:'green' },
];

const MOCK_MEAL_POOL = [
  ['차조밥', '순두부찌개', '탕수육', '어묵볶음', '배추김치', '방울토마토'],
  ['보리밥', '콩나물국', '돈까스&소스', '브로콜리무침', '깍두기', '요구르트'],
  ['흑미밥', '미역국', '닭갈비', '계란말이', '오이무침', '수박']
];
function hashStr(s){
  let sum = 0;
  for(let i=0;i<s.length;i++) sum += s.charCodeAt(i);
  return sum;
}
// 학교명 + 요일 인덱스로 목업 풀에서 하나 골라서 그 주의 목업 데이터 구성
function buildMockWeekData(schoolName, days){
  const mealsByDate = {};
  days.forEach((d, i) => {
    const items = MOCK_MEAL_POOL[(hashStr(schoolName) + i) % MOCK_MEAL_POOL.length];
    mealsByDate[toYmd(d)] = { DDISH_NM: items.join('<br/>'), MMEAL_SC_CODE: '2' };
  });
  return mealsByDate;
}

/* ---------------- 날짜 유틸 (주간 계산용) ---------------- */
const WEEKDAY_LABELS = ['일','월','화','수','목','금','토'];
function pad2(n){ return String(n).padStart(2, '0'); }
function toYmd(d){ return `${d.getFullYear()}${pad2(d.getMonth()+1)}${pad2(d.getDate())}`; }
function toDisplayDate(d){ return `${d.getMonth()+1}/${d.getDate()}`; }

// 기준 날짜(YYYY-MM-DD)가 속한 주의 월~금 Date 배열 반환
function getWeekMonToFri(baseDateStr){
  const base = new Date(baseDateStr + 'T00:00:00');
  const dow = base.getDay(); // 0=일 ... 6=토
  const diffToMon = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(base);
  monday.setDate(base.getDate() + diffToMon);
  const days = [];
  for(let i=0;i<5;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

const SLOT_META = [
  {icon:'🍚', label:'밥'},
  {icon:'🥣', label:'국/찌개'},
  {icon:'🍖', label:'메인반찬'},
  {icon:'🥦', label:'반찬'},
  {icon:'🥬', label:'김치'},
  {icon:'🍉', label:'후식'}
];
const SPINE = { coral:'var(--coral)', sky:'var(--sky)', purple:'var(--purple)', green:'var(--green)', yellow:'var(--yellow)' };

/* ---------------- 도서 검색 ---------------- */
function searchBooks(){
  const keyword = document.getElementById('bookKeyword').value.trim();
  const resultEl = document.getElementById('bookResult');

  if(!keyword){
    resultEl.innerHTML = `<div class="status"><span class="big-emoji">🐥</span>찾고 싶은 책 제목이나 낱말을 입력해 주세요!</div>`;
    return;
  }

  resultEl.innerHTML = `<div class="status"><span class="big-emoji">🔎</span>책을 찾고 있어요...</div>`;

  if(CONFIG.USE_MOCK_LIBRARY){
    setTimeout(() => renderBooks(MOCK_BOOKS, keyword), 500);
    return;
  }

  /* --------- 실제 API 연동 코드 (키 준비되면 사용) ---------
  const url = `${CONFIG.LIBRARY_BASE_URL}?authKey=${CONFIG.LIBRARY_API_KEY}&keyword=${encodeURIComponent(keyword)}&pageSize=10&format=json`;
  fetch(url)
    .then(res => res.json())
    .then(data => {
      const docs = (data.response && data.response.docs) || [];
      const books = docs.map(d => ({
        title: d.doc.bookname,
        author: d.doc.authors,
        publisher: d.doc.publisher,
        color: 'sky'
      }));
      renderBooks(books, keyword);
    })
    .catch(() => {
      resultEl.innerHTML = `<div class="status"><span class="big-emoji">😥</span>책을 불러오지 못했어요. 잠시 후 다시 시도해 주세요.</div>`;
    });
  ------------------------------------------------------------- */
}

function renderBooks(books, keyword){
  const resultEl = document.getElementById('bookResult');
  if(!books.length){
    resultEl.innerHTML = `<div class="status"><span class="big-emoji">📭</span>'${keyword}' 관련 책을 찾지 못했어요.</div>`;
    return;
  }
  resultEl.innerHTML = `
    <div class="book-list">
      ${books.map((b,i) => `
        <div class="book-card" style="animation-delay:${i*0.06}s">
          <div class="book-spine" style="background:${SPINE[b.color] || 'var(--sky)'}"></div>
          <div class="book-info">
            <div class="title">${b.title}</div>
            <div class="meta">${b.author} · ${b.publisher}</div>
            <span class="badge">'${keyword}' 검색 결과</span>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

/* ---------------- 급식 검색 (이번주 월~금) ---------------- */
async function searchMeal(){
  const officeCode = document.getElementById('officeSelect').value;
  const officeName = OFFICE_CODES.find(o => o.code === officeCode)?.name || '';
  const schoolName = document.getElementById('schoolNameInput').value.trim();
  const date = document.getElementById('mealDate').value;
  const resultEl = document.getElementById('mealResult');

  if(!schoolName){
    resultEl.innerHTML = `<div class="status"><span class="big-emoji">🏫</span>학교 이름을 입력해 주세요!</div>`;
    return;
  }

  const days = getWeekMonToFri(date); // 월~금 Date 배열

  resultEl.innerHTML = `<div class="status"><span class="big-emoji">🍽️</span>${officeName}에서 '${schoolName}'의 이번주 급식을 확인하고 있어요...</div>`;

  if(CONFIG.USE_MOCK_MEAL){
    setTimeout(() => renderWeekMeal(days, buildMockWeekData(schoolName, days), schoolName, officeName), 500);
    return;
  }

  try{
    let schulCode = document.getElementById('selectedSchulCode').value;
    let fullName = schoolName;

    if(!schulCode){
      // 자동완성으로 고르지 않고 직접 입력 후 바로 버튼을 누른 경우 - 여기서 조회
      const schoolUrl = `${CONFIG.NEIS_SCHOOL_URL}&ATPT_OFCDC_SC_CODE=${officeCode}&SCHUL_NM=${encodeURIComponent(schoolName)}`;
      const schoolRes = await fetch(schoolUrl);
      if(!schoolRes.ok) throw new Error('school-http-' + schoolRes.status);
      const schoolData = await schoolRes.json();
      const schoolRows = schoolData.schoolInfo?.[1]?.row || [];

      if(!schoolRows.length){
        resultEl.innerHTML = `<div class="status"><span class="big-emoji">🔍</span>'${schoolName}' 학교를 ${officeName}에서 찾지 못했어요. 이름을 다시 확인해 주세요.</div>`;
        return;
      }
      schulCode = schoolRows[0].SD_SCHUL_CODE;
      fullName = schoolRows[0].SCHUL_NM;
    }

    // 2단계: 학교코드로 이번주(월~금) 급식 정보 한 번에 조회
    const fromYmd = toYmd(days[0]);
    const toYmdVal = toYmd(days[4]);
    const mealUrl = `${CONFIG.NEIS_MEAL_URL}&ATPT_OFCDC_SC_CODE=${officeCode}&SD_SCHUL_CODE=${schulCode}&MLSV_FROM_YMD=${fromYmd}&MLSV_TO_YMD=${toYmdVal}&pSize=50`;
    const mealRes = await fetch(mealUrl);
    if(!mealRes.ok) throw new Error('meal-http-' + mealRes.status);
    const mealData = await mealRes.json();
    const mealRows = mealData.mealServiceDietInfo?.[1]?.row || [];

    // 날짜별로 그룹화 (같은 날 여러 끼니가 있으면 중식(코드 2)을 우선)
    const mealsByDate = {};
    mealRows.forEach(r => {
      const ymd = r.MLSV_YMD;
      if(!mealsByDate[ymd] || r.MMEAL_SC_CODE === '2'){
        mealsByDate[ymd] = r;
      }
    });

    renderWeekMeal(days, mealsByDate, fullName, officeName);

  } catch(err){
    console.error(err);
    resultEl.innerHTML = `
      <div class="status">
        <span class="big-emoji">😥</span>
        급식 정보를 불러오지 못했어요.<br>
        <span style="font-size:12px;">(서버 연결 문제일 수 있어요. 잠시 후 다시 시도해 주세요.)</span>
      </div>`;
  }
}

function renderWeekMeal(days, mealsByDate, schoolName, officeName){
  const resultEl = document.getElementById('mealResult');
  const todayYmd = toYmd(new Date());

  const cardsHtml = days.map(d => {
    const ymd = toYmd(d);
    const row = mealsByDate[ymd];
    const isToday = ymd === todayYmd;

    let bodyHtml;
    if(row && row.DDISH_NM){
      const items = row.DDISH_NM
        .split('<br/>')
        .map(s => s.replace(/\([^)]*\)/g, '').replace(/[0-9.]+$/, '').trim())
        .filter(Boolean)
        .slice(0, 6);
      bodyHtml = `
        <div class="day-tray">
          ${items.map(item => `
            <div class="day-slot">${item}</div>
          `).join('')}
        </div>`;
    } else {
      bodyHtml = `<div class="day-empty">이 날은 급식 정보가 없어요</div>`;
    }

    return `
      <div class="day-card ${isToday ? 'today' : ''}">
        <div class="day-header">
          <span class="day-name">${WEEKDAY_LABELS[d.getDay()]}요일</span>
          <span class="day-date">${toDisplayDate(d)}</span>
          ${isToday ? '<span class="today-badge">오늘</span>' : ''}
        </div>
        ${bodyHtml}
      </div>`;
  }).join('');

  resultEl.innerHTML = `
    <div class="meal-date-label">${schoolName} <span style="font-size:12px;color:var(--muted);">(${officeName})</span></div>
    <div class="meal-date-label" style="font-size:12.5px;margin-top:0;color:var(--muted);font-family:'Noto Sans KR',sans-serif;">${toDisplayDate(days[0])} ~ ${toDisplayDate(days[4])} · 이번주</div>
    <div class="week-wrap">${cardsHtml}</div>
  `;
}
</script>
